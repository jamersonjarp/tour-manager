function calcPagoDia(persona, rol, evento, tours) {
  if (evento === "No asignado") return 0;
  if (rol === "Conductor") {
    if (evento === "Descanso") return PAYROLL_CONFIG.conductorDescanso;
    if (evento === "Trabajo") return PAYROLL_CONFIG.conductorBase + (tours || 0) * PAYROLL_CONFIG.conductorPorTour;
    return 0;
  }
  // Guía
  var tarifa = PAYROLL_CONFIG.guiaTarifas[persona] || 0;
  if (evento === "Trabajo" || evento === "Descanso") return tarifa;
  return 0;
}

function calcNominaFromOps(operacion) {
  // Calculate guide payroll from operation records
  var guiaMap = {};
  var condMap = {};
  operacion.forEach(function(o) {
    if (o.rol === "Guía") {
      if (!guiaMap[o.persona]) guiaMap[o.persona] = {trabajo: 0, descanso: 0, total: 0};
      if (o.evento === "Trabajo") guiaMap[o.persona].trabajo++;
      if (o.evento === "Descanso") guiaMap[o.persona].descanso++;
      guiaMap[o.persona].total += (o.pagoDia || 0);
    } else if (o.rol === "Conductor") {
      if (!condMap[o.persona]) condMap[o.persona] = {dias: 0, total: 0};
      if (o.evento !== "No asignado") condMap[o.persona].dias++;
      condMap[o.persona].total += (o.pagoDia || 0);
    }
  });
  var nominaGuias = Object.keys(guiaMap).map(function(g) {
    var d = guiaMap[g];
    var sal = PAYROLL_CONFIG.guiaTarifas[g] ? Math.round(PAYROLL_CONFIG.guiaTarifas[g] * 30) : 0;
    return {guia: g, salarioMes: sal, diasTrabajo: d.trabajo, descansosPagos: d.descanso, diasPagados: d.trabajo + d.descanso, totalPagar: d.total, alerta: d.descanso > 0 ? "OK" : "FALTA DESCANSO"};
  });
  var nominaConductores = Object.keys(condMap).map(function(c) {
    return {conductor: c, diasPagados: condMap[c].dias, totalPagar: condMap[c].total, alerta: "OK"};
  });
  return {nominaGuias: nominaGuias, nominaConductores: nominaConductores};
}

// Initialize PAYROLL_CONFIG from localStorage at startup (so nomina calcs use saved tarifas)
(function(){
  try{
    var saved=localStorage.getItem("payroll_config");
    if(saved){
      var p=JSON.parse(saved);
      if(p.conductorBase)PAYROLL_CONFIG.conductorBase=p.conductorBase;
      if(p.conductorPorTour)PAYROLL_CONFIG.conductorPorTour=p.conductorPorTour;
      if(p.conductorDescanso)PAYROLL_CONFIG.conductorDescanso=p.conductorDescanso;
      if(p.guiaTarifas)PAYROLL_CONFIG.guiaTarifas=Object.assign({},p.guiaTarifas);
    }
  }catch(e){}
})();

function loadFromStorage(key, fallback) {
  try {
    var stored = localStorage.getItem(key);
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return fallback;
}

function saveToStorage(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {}
}
